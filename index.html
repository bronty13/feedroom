**https://bronty13.github.io/feedroom/** · works on any phone, tablet, or computer browser.

The Feed Room is a private Big Brother fantasy league for family and friends
(season: **BB28 "Time Trip"**). Everyone drafts a team of houseguests; the
commissioner logs what happens on the show each week; points and standings
update live on every screen. There are no accounts to create — you sign in
with Google.

The page is organized as numbered **"cams"** (camera cards), like a live-feed
control room. Which cams you see depends on whether you're a regular player
or the **commissioner** (the person who created the league and runs it).

---

## Quick start

**Players:**
1. Open the invite link your commissioner sent you.
2. Sign in with Google.
3. Pick a display name and color → **Join league**. Your team is created automatically.
4. Make your **season predictions** (CAM 12) before they lock.
5. On draft night, watch for the green **"YOU'RE ON THE CLOCK"** banner — tap a
   houseguest card, then confirm. That's your pick.
6. Each week, enter your **weekly calls** (CAM 13) before they lock.

**Commissioner:**
1. Sign in → **Create league** (CAM 02).
2. Copy the invite link (CAM 03 · INVITE LINK) and send it to everyone.
3. Seed the cast, set the draft order, start the draft (CAM 08).
4. After each episode (or from the feeds): log the week (CAM 10) and advance
   **Aired through**. Set **Picks lock at** to open each week's calls.
5. Lock predictions on draft night; enter results at the finale.

---

## Signing in

One button: **Sign in with Google**. No password is stored by the app. If you
arrived via an invite link, sign-in returns you straight to the join screen.
**Sign out** is in the top-right corner.

## My Leagues (CAM 01)

Every league you belong to, with your color dot and a COMMISH badge where you
run it. Click a league to open it. This list works across devices — sign in
anywhere and your leagues follow you.

## Creating a league (CAM 02)

| Field | What it does |
|---|---|
| **League name** | Shown everywhere, including on invite links. Can't easily be renamed later (ask the developer), so pick a good one. |
| **Your display name** | How you appear in member lists, boards, and picks. Editable later in Your Profile. |
| **Color** | Your identity dot throughout the app, and your team's starting color. |

Creating a league makes you its **commissioner**: you run the draft, log the
show, control locks and results, and can fix anything. A league supports any
number of members; each person lands on their own team (see Teams).

## Invite link & join code (CAM 03 · commissioner only)

The invite card shows a link like \`…/#/join/{league}/{CODE}\` — the link
carries the join code, so joining from it is one tap. The join code itself
(e.g. \`K7QF-3XNM\`) is checked **on the server**: nobody can join without it,
even if they learn your league's internal ID.

⚠️ If you delete a league and make a new one, **old links die**. Always copy
the current link from the league page you're actually using.

## Joining (CAM 02 · INVITE)

| Field | What it does |
|---|---|
| **Join code** | Pre-filled when you used the full invite link. Must match exactly (server-checked). |
| **Your display name / color** | Same as above. |

Joining auto-creates **your team** (named "Team {yourfirstname}", your color).
If you open an invite link for a league you already joined, you're taken
straight to the league. If the league's name can't be loaded, you can still
join with a valid code — the warning usually means the link is from a deleted
league.

## Teams (CAM 05)

Rosters belong to **teams**, not directly to people, so a team can have
co-owners (ask the commissioner to combine teams). The team card lists its
owners and, after the draft, its houseguests in pick order.

## Your Profile (CAM 06)

| Field | What it does |
|---|---|
| **Display name** | Rename yourself anytime. |
| **Color** | Recolor your dot anytime. |
| **Spoiler shield** | See *Spoiler shield* below — hides feed results until they've aired on CBS. |

## The cast (CAM 07 · THE HOUSE)

A card per houseguest: photo, name, age, occupation, status pill, tags, and —
once drafted — the owning team and pick number.

**Status pills:** \`IN\` (playing) · \`EVICTED\` · \`JURY\` · \`REMOVED\` (left the
game/cast) · \`RETURNED\` (came back — worth points!). **Tags:** \`RETURNEE\`
(veteran player) · \`LATE-ADD\` (entered after the premiere, like Dee
Valladares).

**Commissioner controls on each card:** a status dropdown (every change keeps
history — if Time Trip un-writes an eviction, set them back to RETURNED) and
a **📷 photo URL** override. Below the grid: an **add-houseguest form** for
mid-season entrants, and photos backfill automatically from public sources.

## The draft (CAM 08)

### Setup (commissioner)

1. **Seed the BB28 cast** — one click loads all houseguests with bios and
   photos. (Rachel Reilly arrives pre-evicted. Volcano.)
2. **Roster mode:**
   - **Exclusive** (default): each houseguest belongs to exactly one team —
     the classic draft. With 17 draftable houseguests, rosters are
     \`floor(17 ÷ teams)\` each.
   - **Duplicate**: every team drafts its own roster from the *full* cast, so
     the same houseguest can be on several teams. Use when you have more
     teams than the cast can split across. **Roster size** sets picks per team.
3. **Round-1 snake order** — reorder with ↑/↓ or **Shuffle**. Round 2 reverses
   (snake), round 3 flips back, and so on.
4. **Start the draft** — needs at least 2 teams.

### Live

The banner shows the round, the pick number, and who's **ON THE CLOCK**.

- **When it's your team's turn**, the banner turns green ("YOU'RE ON THE
  CLOCK"), your tab title flashes, and the cast cards become tappable *on
  your device*: tap a card to select (amber border), then hit
  **Draft {name} → {your team}**. Turn order is enforced by the server — you
  can't pick out of turn, and two simultaneous picks can't both land.
- **The commissioner can always pick for whoever is on the clock** (someone's
  phone died), **Undo** the last pick, or **End draft early**. The draft
  completes automatically when rosters are even.

Everyone else watches picks land in real time.

## Weekly calls (CAM 13 · WEEK N PICKS)

Each week, predict: **Wins HOH · Wins the veto · Goes home.** Worth **+3 / +2
/ +3** to your team (defaults).

- Picks open when the commissioner sets a **lock time** for the week, and the
  card shows a countdown ("Locks in 2d 04:12:33").
- **Until the lock**: edit freely; the board only shows how many people are in.
- **At the lock**: everyone's calls are revealed, and editing is refused — by
  the server's clock, so nobody can sneak a late edit.
- As the week's real results get logged, hits grade automatically and show as
  "weekly calls +N" in the standings.

## The week logger (CAM 10 · commissioner only)

Create a week with **+ New week**, fill it in as the show unfolds, **Save**.
Scoring recomputes instantly from what's saved — editing a past week
automatically reverses/reapplies its points.

| Field | What it does |
|---|---|
| **HOH** | Who won Head of Household (+10 default). |
| **Veto holder** | Who won the Power of Veto (+8). |
| **Nominees** | Tap chips for everyone nominated. More than two is fine (twists). |
| **Veto used on** | Who the veto saved (if used). Choosing someone reveals… |
| **Renom** | …the replacement nominee. |
| **Evicted** | Limited to the *final* nominees. Saving it flips that houseguest to EVICTED on the cast (history kept). Clearing it un-scores the eviction — the "history rewritten" lever. Surviving final nominees score +3 each. |
| **Aired through** | The spoiler gate: the furthest milestone that has **aired on CBS** — Nothing → HOH → Nominations (Sun) → Veto (Wed) → Eviction (Thu). Advance it after each episode. Spoiler-shielded members see only up to this point; everyone else always sees everything. |
| **Picks lock at** | The weekly-calls deadline. Setting it **opens** CAM 13 for the week; when the time passes, picks lock and reveal. Presets: next Sun / next Thu 8pm ET, or any date-time. **Set it before the events leak on the feeds** — e.g. lock before Friday night's HOH comp, not before Thursday's episode. Until you set it, the week's calls stay closed. |
| **Extras** | Anything else that deserves points: pick a houseguest, a rule (or type a custom points value), and a note ("Won the time machine comp"). Also your correction tool — negative points undo mistakes. |
| **Week recap** | A few sentences for the Season cam. Spoiler-gated until the eviction airs. |

For a double eviction, just create another week (it'll be numbered next) or
log the second boot via Extras — whatever your league prefers.

## Season predictions (CAM 12)

Before the season gets going, everyone picks: **👑 Winner · 🥾 First boot ·
⭐ America's Favorite** (+15 / +10 / +10 to your team).

- **Open**: edit your own picks; others' picks are hidden (the board shows
  "5/8 picked").
- The commissioner **locks predictions** (usually draft night) — that's the
  reveal moment, and editing is refused server-side from then on.
- The commissioner enters **Results** as they're known (first boot after the
  first post-draft eviction; winner and AFP at the finale). Saving results
  pays out instantly — "predictions +N" appears in the standings breakdown.

## Standings (CAM 11) and Season (CAM 14)

- **Standings**: teams ranked by total points = roster points + prediction
  payout + weekly calls. The breakdown under each team shows exactly where
  every point came from. **Hot houseguests** ranks the top scorers.
- **Season**: the points-over-weeks chart (hover for exact values) and the
  week-by-week recap cards.

## Scoring rules (CAM 15 · visible to everyone, editable by the commissioner)

Defaults: HOH **+10** · Veto **+8** · Survived the block **+3** · Evicted
**−4** · Returned **+6** · Winner **+25** · Runner-up **+10** · AFP **+5** ·
Predictions **+15/+10/+10** · Weekly calls **+3/+2/+3**.

Every member sees the current point values. The commissioner can edit any
value, add custom rules (they appear in the week logger's Extras), or reset
to defaults. Changes recompute the whole season instantly — that's
intentional (scores always derive from the logged events).

## Spoiler shield

The live feeds run 24/7, so the commissioner often knows results days before
they air. With **Spoiler shield ON** (Your Profile), everything you see —
the dashboard, standings, weekly-call grading, even cast statuses — is
frozen at each week's **Aired through** milestone. A feeds-spoiled eviction
literally shows the houseguest as still IN until Thursday's episode airs.
The commissioner is never shielded (they need the real state to log).

## Danger zone (CAM 16 · commissioner only)

**Delete this league** permanently removes everything — members, teams, cast,
weeks, picks, predictions. Type the league's exact name to arm the button.
**There is no undo**, and old invite links die with it.

## Troubleshooting

- **"Invite not found" / join fails** → the link is probably from a deleted
  league. Copy a fresh one from the current league's invite cam.
- **No photos, just initials** → the commissioner opens the league once
  (photos backfill automatically); if they still don't load, an ad-blocker
  may be blocking the image host.
- **Can't pick in the draft** → it's only tappable when *your* team is on the
  clock (green banner). The commissioner can always pick for anyone.
- **Weekly picks card says "NOT OPEN YET"** → the commissioner hasn't set
  that week's **Picks lock at** time.
- **Am I on the latest version?** → the footer version (e.g. \`v0.9.2\`) should
  match everyone else's. Hard-refresh (Cmd+Shift+R / Ctrl+F5) if not.

## The manual & What's new

- This manual lives in the app: **Manual** in the top bar (or the footer),
  and it works even before you sign in — share
  \`bronty13.github.io/feedroom/#/manual\` freely.
- After each app update, a **What's new** card appears once at the top.
  **Got it** hides it until the next update (per device); reopen it anytime
  via **What's new** in the footer.

## Where to watch BB28

CBS: Sunday 8pm (nominations) · Wednesday 8pm, 90 min (veto) · **Thursday 8pm
LIVE eviction** · Friday 8pm *Big Brother: Unlocked*. Live feeds 24/7 on any
